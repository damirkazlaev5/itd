{% extends "base.html" %}
{% block content %}
<h2>Лента</h2>

<form method="post" action="{{ url_for('create_post') }}">
    <textarea name="content" rows="3" cols="50" placeholder="Что у вас нового?" required></textarea><br><br>
    <button type="submit">Опубликовать</button>
</form>

<hr>

<!-- Сюда будем вставлять посты через JS -->
<div id="feed-container"></div>

<script>
function renderPosts(posts) {
    const container = document.getElementById('feed-container');
    container.innerHTML = '';
    if (posts.length === 0) {
        container.innerHTML = '<p>Пока нет постов.</p>';
        return;
    }
    posts.forEach(p => {
        const div = document.createElement('div');
        div.className = 'post';
        const date = new Date(p.created_at).toLocaleString();
        div.innerHTML = `
            <strong>${escapeHtml(p.username)}</strong>
            <p>${escapeHtml(p.content)}</p>
            <div class="meta">Опубликовано: ${date}</div>
        `;
        container.appendChild(div);
    });
}

// Простая защита от XSS
function escapeHtml(str) {
    return str.replace(/[&<>"']/g, match => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[match]);
}

async function loadPosts() {
    try {
        const res = await fetch('/api/posts');
        const data = await res.json();
        renderPosts(data.posts);
    } catch (e) {
        console.error('Ошибка загрузки постов', e);
    }
}

// Обновляем каждую секунду
setInterval(loadPosts, 1000);
// Первый раз сразу
loadPosts();
</script>
{% endblock %}
